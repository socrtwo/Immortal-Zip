name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-tk binutils dpkg-dev fakeroot file desktop-file-utils \
            libfuse2 wget
      - name: Python deps
        run: pip install pyinstaller==6.10.0
      - name: Get appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      - name: Build Linux artifacts
        run: bash build/build_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Python deps
        run: pip install pyinstaller==6.10.0
      - name: Build macOS artifacts
        run: bash build/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Python deps
        run: pip install pyinstaller==6.10.0
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: ./build/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*Setup.exe

  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Build APK
        env:
          PAGES_HOST: socrtwo.github.io/Immortal-Zip
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS || 'immortal-zip' }}
        run: bash build/build_android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*.apk

  ios:
    runs-on: macos-14
    # Only run if Apple signing secrets are present — otherwise the IPA
    # cannot be produced and the job would always fail.
    if: ${{ vars.IOS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Import signing cert
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > cert.p12
          KEYCHAIN=build.keychain
          security create-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
      - name: Build IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPORT_METHOD: ad-hoc
        run: bash build/build_ios.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*.ipa

  web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Package web bundle
        run: |
          mkdir -p dist
          (cd web && zip -r ../dist/Immortal-Zip-Web-1.0.0.zip .)
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/*.zip

  release:
    needs: [linux, macos, windows, android, web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
